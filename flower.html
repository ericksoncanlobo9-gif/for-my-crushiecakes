<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Flower for You 🌹</title>
    <style>
        body {
            background-color: #000; /* Dark background para litaw ang kulay */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        /* Flower Animation Container */
        .flower {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 50px;
        }

        .petal {
            position: absolute;
            background: #ff4d6d;
            width: 50px;
            height: 80px;
            border-radius: 50px 50px 0 0;
            transform-origin: bottom center;
            opacity: 0;
            animation: bloom 3s ease-out forwards;
        }

        /* Iba't ibang angle ng petals */
        .petal:nth-child(1) { transform: rotate(0deg); animation-delay: 0.5s; }
        .petal:nth-child(2) { transform: rotate(45deg); animation-delay: 0.7s; }
        .petal:nth-child(3) { transform: rotate(90deg); animation-delay: 0.9s; }
        .petal:nth-child(4) { transform: rotate(135deg); animation-delay: 1.1s; }
        .petal:nth-child(5) { transform: rotate(180deg); animation-delay: 1.3s; }
        .petal:nth-child(6) { transform: rotate(225deg); animation-delay: 1.5s; }
        .petal:nth-child(7) { transform: rotate(270deg); animation-delay: 1.7s; }
        .petal:nth-child(8) { transform: rotate(315deg); animation-delay: 1.9s; }

        @keyframes bloom {
            0% { opacity: 0; height: 0; }
            100% { opacity: 0.9; height: 80px; }
        }

        /* Stem ng bulaklak */
        .stem {
            width: 5px;
            height: 150px;
            background: #2d6a4f;
            position: absolute;
            top: 80px;
            left: 48px;
            border-radius: 0 0 5px 5px;
        }

        #message {
            text-align: center;
            max-width: 80%;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 3.5s; /* Lalabas pagkatapos mag-bloom */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: #ff4d6d; }
    </style>
</head>
<body>

    <div class="flower">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="stem"></div>
    </div>

    <div id="message">
        <h2>Para sa pinakamagandang bulaklak sa buhay ko...</h2>
        <p>Simple lang 'to, pero sana napangiti kita ulit. <br> 
        Hindi man ako laging nakakapag-abot ng totoong bulaklak, <br>
        itong digital na 'to, hinding-hindi malalanta gaya ng paghanga ko sa'yo.</p>
        <p><b>Ingat ka lagi, Sheryl. ❤️</b></p>
    </div>

</body>
</html>
