<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Purple Tulip for You 💜</title>
    <style>
        body {
            background-color: #f3e5f5; /* Light Purple background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #4a148c; /* Dark Purple Text */
            overflow: hidden; /* Para hindi lumabas ang scrollbar sa petals */
        }

        /* --- TULIP ANIMATION --- */
        .tulip-container {
            position: relative;
            width: 100px;
            height: 250px;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-in forwards;
        }

        /* Tulip Flower Head */
        .tulip-head {
            position: absolute;
            width: 70px;
            height: 100px;
            left: 15px;
            top: 0;
            transform-origin: bottom center;
            animation: tulipBloom 2s ease-out forwards;
            opacity: 0;
        }

        .petal-left, .petal-center, .petal-right {
            position: absolute;
            background: #9c27b0; /* Main Purple color */
            border-radius: 50px 50px 0 0;
        }

        .petal-center {
            width: 70px;
            height: 100px;
            left: 0;
            top: 0;
            z-index: 2;
        }

        .petal-left {
            width: 50px;
            height: 80px;
            left: -15px;
            top: 10px;
            transform: rotate(-30deg);
            background: #7b1fa2; /* Darker Purple for depth */
            z-index: 1;
        }

        .petal-right {
            width: 50px;
            height: 80px;
            right: -15px;
            top: 10px;
            transform: rotate(30deg);
            background: #7b1fa2; /* Darker Purple for depth */
            z-index: 1;
        }

        @keyframes tulipBloom {
            0% { opacity: 0; transform: scale(0.1) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Tulip Stem */
        .stem {
            position: absolute;
            width: 8px;
            height: 150px;
            background: #2e7d32; /* Green Stem */
            left: 46px;
            top: 90px;
            border-radius: 0 0 5px 5px;
            z-index: 0;
        }

        /* --- FLOATING PETALS ANIMATION --- */
        .petal {
            position: absolute;
            width: 15px;
            height: 25px;
            background: #e1bee7; /* Very Light Purple Petals */
            border-radius: 50% 0 50% 50%;
            pointer-events: none;
            opacity: 0;
            animation: fall 6s linear infinite;
        }

        @keyframes fall {
            0% { opacity: 0; transform: translateY(-50px) rotate(0deg); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }

        /* --- MESSAGE STYLING --- */
        #message {
            text-align: center;
            max-width: 80%;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 2.5s; /* Lalabas pagkatapos mag-bloom */
            background: rgba(255, 255, 255, 0.7); /* Translucent White Background */
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: #6a1b9a; margin-top: 0; }
        p { line-height: 1.6; font-size: 1.1em; }
        b { color: #8e24aa; }
    </style>
</head>
<body>

    <div class="tulip-container">
        <div class="tulip-head">
            <div class="petal-left"></div>
            <div class="petal-center"></div>
            <div class="petal-right"></div>
        </div>
        <div class="stem"></div>
    </div>

    <div id="message">
        <h2>Para sa pinakamagandang bulaklak sa buhay ko...</h2>
        <p>Simple lang 'to, pero sana napangiti kita ulit. <br> 
        Heto muna ang digital tulip ko para sa'yo, <br>
        kasi hindi pa ako nakakapagbigay sa'yo ng totoong bulaklak eh.</p>
        <p><b>Ingat ka lagi, Sheryl. ❤️</b></p>
    </div>

    <script>
        // Gumawa ng maraming floating petals
        for (let i = 0; i < 25; i++) {
            createPetal();
        }

        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            // Randomize position and animation properties
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDelay = Math.random() * 5 + 's';
            petal.style.animationDuration = (Math.random() * 3 + 4) + 's'; // 4 to 7 seconds
            
            // Randomize rotation to look natural
            petal.style.transform = `rotate(${Math.random() * 360}deg)`;
            
            document.body.appendChild(petal);
        }
    </script>

</body>
</html>
